<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>英検4級でる順パス単 動詞 p41-49 不規則動詞の過去形</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f5f5; 
            --primary-orange: #ff9800; 
            --accent-yellow: #ffeb3b; 
            --text-dark: #212121;
            --white: #ffffff;
            --gray-main: #9e9e9e;
            --error-red: #f44336;
            --success-green: #4caf50;
            --base-font: 'Andika', "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "Yu Gothic", "Meiryo", sans-serif;
        }

        body {
            font-family: var(--base-font);
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--text-dark);
            color: var(--primary-orange);
            width: 100%;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border-bottom: 4px solid var(--primary-orange);
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 20px 0;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            border: 3px solid var(--gray-main);
        }

        .progress-bar { font-size: 1.1rem; color: var(--primary-orange); margin-bottom: 15px; font-weight: bold; }
        
        .word-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .word-display { 
            font-size: 3.2rem; 
            font-weight: 700; 
            color: var(--text-dark); 
            letter-spacing: 1px;
            border-bottom: 5px solid var(--accent-yellow);
            display: inline-block;
            padding: 0 10px;
            margin: 0;
        }

        .speaker-btn {
            background: #e1f5fe;
            border: 2px solid #03a9f4;
            color: #03a9f4;
            font-size: 1.8rem;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            box-shadow: 0 4px 0 #0288d1;
        }
        .speaker-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0288d1;
        }

        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .choice-btn {
            background: var(--white);
            border: 2px solid var(--text-dark);
            padding: 15px 5px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-dark);
            font-family: var(--base-font);
            min-height: 85px; 
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }

        ruby rt { font-size: 0.55em; font-weight: normal; color: #555; }

        .choice-btn:hover { background-color: var(--accent-yellow); border-color: var(--primary-orange); }
        .choice-btn.wrong { background-color: #ffebee; border-color: var(--error-red); color: var(--error-red); animation: shake 0.3s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        #result-screen { display: none; }
        .score-num { font-size: 4rem; color: var(--primary-orange); font-weight: 700; }
        .mistake-list { text-align: left; background: #fafafa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid var(--gray-main); max-height: 300px; overflow-y: auto; }
        .mistake-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; }

        .action-btn { 
            background-color: var(--primary-orange); 
            color: var(--text-dark); 
            border: none; 
            padding: 15px 40px; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            width: 100%;
            font-family: var(--base-font);
            box-shadow: 0 4px 0 #e68a00;
        }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.2rem;">英検4級でる順パス単 動詞 p41-49 不規則動詞の過去形</h1>
</header>

<div class="container" id="quiz-screen">
    <div class="progress-bar" id="progress">1 / 39</div>
    <div class="word-area">
        <div class="word-display" id="word-text">Loading...</div>
        <button class="speaker-btn" onclick="speakCurrentWord()">🔊</button>
    </div>
    <div class="choices-grid" id="choices-container"></div>
    <div id="feedback" style="margin-top:20px; height: 1.2em; font-weight: bold; font-size: 1.3rem;"></div>
</div>

<div class="container" id="result-screen">
    <h2 style="font-size: 1.5rem;">トレーニング終了！</h2>
    <div style="font-size: 1.2rem;">一発正解：<span class="score-num" id="final-score">0</span> / 39</div>
    <div id="mistake-container" style="display:none;">
        <h3 style="color: var(--primary-orange); margin-top:25px;">要確認リスト</h3>
        <div class="mistake-list" id="mistake-list"></div>
    </div>
    <button class="action-btn" onclick="sendEmail()">Tamaki先生に報告する</button>
    <button class="action-btn" style="background-color: var(--gray-main); box-shadow: 0 4px 0 #757575;" onclick="location.reload()">もう一度（シャッフル）</button>
</div>

<script>
function speak(txt, rate = 0.7) {
    window.speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(txt);
    u.lang = "en-US"; 
    u.rate = rate;
    window.speechSynthesis.speak(u);
}

function speakCurrentWord() {
    const word = document.getElementById('word-text').textContent;
    speak(word);
}

const quizData = [
    // p41-43 基本的な動詞の過去形
    {w:"went", a:"行った", c:["来た", "見た", "買った"]},
    {w:"bought", a:"〜を買った", c:["〜を売った", "〜を持ってきた", "〜を作った"]},
    {w:"got", a:"〜を手に入れた", c:["〜を失った", "〜を見つけた", "〜を忘れた"]},
    {w:"came", a:"来た", c:["行った", "去った", "戻った"]},
    {w:"saw", a:"〜に会った", c:["〜を話した", "〜を聴いた", "〜を呼んだ"]},
    {w:"took", a:"〜を取った", c:["〜を作った", "〜を運んだ", "〜を終えた"]},
    {w:"made", a:"〜を作った", c:["〜を買った", "〜を売った", "〜を壊した"]},
    {w:"met", a:"〜に会った", c:["〜を誘った", "〜を訪ねた", "〜を呼んだ"]},
    {w:"said", a:"〜と言った", c:["〜が聞こえた", "〜に伝えた", "〜を聴いた"]},
    {w:"told", a:"〜に伝えた", c:["〜に答えた", "〜を尋ねた", "〜と言った"]},

    // p43-45 コミュニケーション・生活の過去形
    {w:"spoke", a:"（言語を）話した", c:["〜と言った", "〜に伝えた", "〜を聴いた"]},
    {w:"heard", a:"〜が聞こえた", c:["（意識して）聴いた", "〜を見た", "〜を話した"]},
    {w:"woke", a:"目覚めた", c:["眠った", "働いた", "休んだ"]},
    {w:"ate", a:"〜を食べた", c:["〜を飲んだ", "〜を作った", "〜を買った"]},
    {w:"drank", a:"〜を飲んだ", c:["〜を食べた", "〜を注いだ", "〜を買った"]},
    {w:"gave", a:"〜を与えた", c:["〜を手に入れた", "〜を持ってきた", "〜を買った"]},
    {w:"brought", a:"〜を持ってきた", c:["〜を持っていった", "〜を買った", "〜を与えた"]},
    {w:"found", a:"〜を見つけた", c:["〜を失った", "〜を忘れた", "〜を手に入れた"]},
    {w:"felt", a:"〜と感じた", c:["〜を考えた", "〜を望んだ", "〜を心配した"]},
    {w:"lost", a:"〜をなくした", c:["〜を見つけた", "（試合に）勝った", "〜を手に入れた"]},

    // p45-48 感情・行動・移動の過去形
    {w:"wrote", a:"〜を書いた", c:["〜を読んだ", "〜と言った", "〜を話した"]},
    {w:"forgot", a:"〜を忘れた", c:["〜を覚えていた", "〜を見つけた", "〜を考えた"]},
    {w:"swam", a:"泳いだ", c:["走った", "跳んだ", "歩いた"]},
    {w:"read", a:"〜を読んだ", c:["〜を書いた", "〜と言った", "〜を聴いた"]},
    {w:"cut", a:"〜を切った", c:["〜を貼った", "〜を壊した", "〜を折った"]},
    {w:"ran", a:"走った", c:["歩いた", "泳いだ", "跳んだ"]},
    {w:"drove", a:"〜を運転した", c:["〜に乗った", "歩いた", "旅行した"]},
    {w:"rode", a:"〜に乗った", c:["〜を運転した", "歩いた", "飛んだ"]},
    {w:"knew", a:"〜を知っていた", c:["〜を考えた", "〜を忘れた", "〜を覚えていた"]},
    {w:"taught", a:"〜を教えた", c:["〜を学んだ", "〜に伝えた", "〜を尋ねた"]},

    // p48-49 思考・その他の過去形
    {w:"thought", a:"〜と思った", c:["〜を知っていた", "〜を忘れた", "〜と感じた"]},
    {w:"wore", a:"〜を身につけていた", c:["〜を脱いだ", "〜を買った", "〜を洗った"]},
    {w:"became", a:"〜になった", c:["〜を始めた", "〜にとどまった", "〜を去った"]},
    {w:"caught", a:"〜を捕まえた", c:["〜を投げた", "〜を落とした", "〜を失った"]},
    {w:"put", a:"〜を置いた", c:["〜を取った", "〜を持った", "〜を拾った"]},
    {w:"sold", a:"〜を売った", c:["〜を買った", "〜を与えた", "〜を借りた"]},
    {w:"sang", a:"〜を歌った", c:["〜を聴いた", "踊った", "〜を話した"]},
    {w:"broke", a:"〜を壊した", c:["〜を作った", "〜を直した", "〜を切った"]},
    {w:"fell", a:"落ちた", c:["跳んだ", "登った", "起き上がった"]}
];

let quizQueue = [];
let currentIndex = 0;
let firstTryCorrectCount = 0;
let isFirstTry = true;
let mistakes = [];

function initQuiz() {
    quizQueue = [...quizData].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    firstTryCorrectCount = 0;
    mistakes = [];
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('result-screen').style.display = 'none';
    loadQuestion();
}

function loadQuestion() {
    const current = quizQueue[currentIndex];
    document.getElementById('progress').textContent = `${currentIndex + 1} / ${quizQueue.length}`;
    document.getElementById('word-text').textContent = current.w;
    document.getElementById('feedback').textContent = "";
    
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    isFirstTry = true;

    const choices = [current.a, ...current.c].sort(() => Math.random() - 0.5);

    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = choice;
        btn.onclick = () => checkAnswer(choice, current.a, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(selected, correct, btn) {
    if (selected === correct) {
        if (isFirstTry) { firstTryCorrectCount++; }
        document.getElementById('feedback').style.color = "var(--success-green)";
        document.getElementById('feedback').textContent = "Excellent! ✨";
        setTimeout(() => {
            currentIndex++;
            if (currentIndex < quizQueue.length) { loadQuestion(); } else { showResult(); }
        }, 500);
    } else {
        if (isFirstTry) {
            mistakes.push({w: quizQueue[currentIndex].w, a: quizQueue[currentIndex].a});
            isFirstTry = false;
        }
        btn.classList.add('wrong');
        document.getElementById('feedback').style.color = "var(--error-red)";
        document.getElementById('feedback').textContent = "Try again!";
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').textContent = firstTryCorrectCount;
    if (mistakes.length > 0) {
        document.getElementById('mistake-container').style.display = 'block';
        document.getElementById('mistake-list').innerHTML = mistakes.map(m => `
            <div class="mistake-item"><strong>${m.w}</strong><span>${m.a.replace(/<[^>]*>?/gm, '')}</span></div>
        `).join('');
    }
}

function sendEmail() {
    const teacherEmail = "tamaki@eigostudio-stepforward.com";
    const subject = encodeURIComponent("英検4級 p41-49 不規則動詞の過去形 トレーニング結果");
    const cleanMistakes = mistakes.map(m => `・${m.w} (${m.a.replace(/<[^>]*>?/gm, '')})`).join("\n");
    let mistakeText = mistakes.length > 0 ? "\n\n■要復習リスト:\n" + cleanMistakes : "\n\nすべて一発正解でした！すばらしい！";
    const body = encodeURIComponent(`Tamaki先生へ\n\n英検4級トレーニング（p41-49 動詞）不規則動詞の過去形を完了しました！\n\n結果: ${quizQueue.length}問中 ${firstTryCorrectCount} 問を一発正解。${mistakeText}`);
    window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
}

window.onload = initQuiz;
</script>
</body>
</html>
